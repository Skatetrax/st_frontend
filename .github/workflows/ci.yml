name: CI — Validate Build

on:
  pull_request:
    branches: [dev, main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --omit=dev || true
        continue-on-error: true

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: https://api.skatetrax.com/api/v4
